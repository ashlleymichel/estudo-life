<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Folha de Estudo</title>
    <meta name="description" content="Plataforma para gerar folhas de estudo da PAZ Church Barueri." />
    <meta property="og:title" content="Folha de Estudo" />
    <meta property="og:description" content="Plataforma para gerar folhas de estudo da PAZ Church Barueri." />
    <meta property="og:type" content="website" />
    <meta name="twitter:title" content="Folha de Estudo" />
    <meta name="twitter:description" content="Plataforma para gerar folhas de estudo da PAZ Church Barueri." />
    <link rel="stylesheet" href="/styles.css?v=10" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <aside class="panel" id="sidePanel">
          <div>
            <div class="brandMark">
              <img src="/paz-logo.svg" alt="Paz Church" />
              <span>PAZ Church Barueri</span>
            </div>
            <h1>Folha de Estudo</h1>
            <p class="eyebrow" id="modeEyebrow">Life Group</p>
            <p class="muted">
              Envie o esboço em PDF ou Word, revise os campos gerados e baixe a folha de estudo pronta.
            </p>
            <a class="savedLink" href="/salvos.html">Arquivos salvos</a>
          </div>

          <div class="modeSwitch" role="group" aria-label="Tipo de conteúdo">
            <button id="lifeMode" class="modeBtn active" type="button">Life Group</button>
            <button id="tadelMode" class="modeBtn" type="button">TADEL</button>
          </div>

          <form id="uploadForm" class="upload">
            <label class="dropzone" for="pdfFile">
              <span class="dropIcon">DOC</span>
              <strong>Selecionar arquivo</strong>
              <small id="fileName">Nenhum arquivo escolhido</small>
            </label>
            <input id="pdfFile" name="arquivo" type="file" accept=".pdf,.doc,.docx,.rtf,.odt,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
            <button id="extractBtn" class="primary" type="submit">Gerar Folha de Estudo</button>
          </form>

          <div class="status" id="status">Aguardando um PDF.</div>
        </aside>

        <section class="editor" aria-label="Editor da folha de estudo">
          <div class="topbar">
            <div>
              <h2>Revisão do conteúdo</h2>
            </div>
            <div class="topActions">
              <button id="saveOnlineBtn" class="secondaryAction" type="button">Salvar Arquivo Online</button>
              <button id="downloadWordBtn" class="secondaryAction" type="button">Baixar Word</button>
              <button id="downloadBtn" class="download" type="button">Baixar PDF</button>
            </div>
          </div>

          <div class="grid">
            <label>
              <span id="tituloLabel">Título da série</span>
              <input id="titulo" type="text" />
            </label>
            <label>
              <span id="subtituloLabel">Linha do culto</span>
              <input id="subtitulo" type="text" />
            </label>
          </div>

          <label class="lifeOnly">
            <span>Momento Generosidade</span>
            <textarea id="momentoGenerosidade" rows="5"></textarea>
          </label>

          <label class="lifeOnly">
            <span>Avisos / Agenda</span>
            <textarea id="avisos" rows="4"></textarea>
          </label>

          <label class="lifeOnly">
            <span>Momento da Visão</span>
            <textarea id="momentoVisao" rows="5"></textarea>
          </label>

          <label>
            <span id="resumoLabel">Resumo</span>
            <textarea id="resumo" rows="7"></textarea>
          </label>

          <div class="questionsHeader lifeOnly">
            <span>Perguntas</span>
            <button id="addQuestion" class="ghost" type="button">Adicionar</button>
          </div>
          <div id="questions" class="questions lifeOnly"></div>

          <label>
            <span>Conclusão</span>
            <textarea id="conclusao" rows="5"></textarea>
          </label>
        </section>

        <section class="documentPreview hidden" id="documentPreview" aria-label="Prévia do arquivo">
          <div class="previewTopbar">
            <div>
              <h2>Prévia do arquivo</h2>
              <p id="previewFormatLabel">PDF</p>
            </div>
            <button id="showMenuBtn" class="secondaryAction" type="button">Mostrar menu</button>
          </div>

          <div class="previewSwitch" role="group" aria-label="Tipo de prévia">
            <button id="previewPdfBtn" class="modeBtn active" type="button">PDF</button>
            <button id="previewWordBtn" class="modeBtn" type="button">Word</button>
          </div>

          <article class="previewPage" id="previewPage"></article>
        </section>
      </section>
    </main>

    <script src="/app.js?v=8"></script>
  </body>
</html>
